name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# Use the sparse registry protocol so each crate is fetched as an
# individual HTTPS request rather than via a single huge git clone of
# the index.  This is far more resilient to transient network issues
# on Windows runners (which occasionally fail with "Connection was
# reset" while pulling crates.io).
env:
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: "sparse"

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libxkbcommon-dev libwayland-dev

      - name: Fetch dependencies (with retry)
        shell: bash
        run: |
          for i in 1 2 3 4 5; do
            cargo fetch --target ${{ matrix.target }} && break
            echo "cargo fetch failed (attempt $i), sleeping 15s..."
            sleep 15
          done

      - name: Build release
        run: cargo build --release --offline --target ${{ matrix.target }}

      - name: Strip (non-Windows)
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/engvis

      - name: Package
        shell: bash
        run: |
          mkdir -p artifacts
          cd target/${{ matrix.target }}/release
          if [ "$RUNNER_OS" = "Windows" ]; then
            7z a ../../../artifacts/engvis-${{ matrix.target }}.zip engvis.exe
            cp engvis.exe ../../../artifacts/engvis-${{ matrix.target }}.exe
          else
            tar czf ../../../artifacts/engvis-${{ matrix.target }}.tar.gz engvis
            cp engvis ../../../artifacts/engvis-${{ matrix.target }}
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          fail_on_unmatched_files: true
