name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libxkbcommon-dev libwayland-dev

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip (non-Windows)
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/engvis

      - name: Package
        shell: bash
        run: |
          mkdir -p artifacts
          cd target/${{ matrix.target }}/release
          if [ "$RUNNER_OS" = "Windows" ]; then
            7z a ../../../artifacts/engvis-${{ matrix.target }}.zip engvis.exe
            cp engvis.exe ../../../artifacts/engvis-${{ matrix.target }}.exe
          else
            tar czf ../../../artifacts/engvis-${{ matrix.target }}.tar.gz engvis
            cp engvis ../../../artifacts/engvis-${{ matrix.target }}
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          fail_on_unmatched_files: true
